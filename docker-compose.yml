services:
  traefik:
    image: traefik:latest
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # --- Entrypoints ---
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP -> HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # --- Let's Encrypt ---
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Для тестирования: раскомментировать staging CA, чтобы не словить rate limit
      # - "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
    environment:
      - DOCKER_API_VERSION=1.40
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - web

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - web

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - api_data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # --- strip /api prefix before forwarding to FastAPI ---
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      # --- API on app.cwim.ru ---
      - "traefik.http.routers.api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.routers.api.middlewares=api-strip"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      # --- API on crm.cwim.ru (CRM тоже обращается к API) ---
      - "traefik.http.routers.api-crm.rule=Host(`${CRM_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-crm.priority=100"
      - "traefik.http.routers.api-crm.middlewares=api-strip"
      - "traefik.http.routers.api-crm.entrypoints=websecure"
      - "traefik.http.routers.api-crm.tls.certresolver=letsencrypt"
      # --- Service port ---
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.site.rule=Host(`${SITE_DOMAIN}`)"
      - "traefik.http.routers.site.entrypoints=websecure"
      - "traefik.http.routers.site.tls.certresolver=letsencrypt"
      - "traefik.http.services.site.loadbalancer.server.port=5000"

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  crm:
    build:
      context: ./crm
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crm.rule=Host(`${CRM_DOMAIN}`)"
      - "traefik.http.routers.crm.entrypoints=websecure"
      - "traefik.http.routers.crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm.loadbalancer.server.port=3000"

volumes:
  traefik_certs:
  redis_data:
  api_data:

networks:
  web:
