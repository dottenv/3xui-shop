<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы — {{ config.brand.name }}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 10C35 10 25 25 25 40v10h-5v40h60V50h-5V40C75 25 65 10 50 10zm-5 45a5 5 0 0110 0v10a5 5 0 01-10 0V55zm15-15H40v-8c0-8 4-12 10-12s10 4 10 12v8z' fill='%232563eb'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #e8edf5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .card {
            text-align: center;
            max-width: 500px;
            padding: 56px 40px;
            background: #14181f;
            border: 1px solid #1e2630;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #fff;
        }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        p { color: #8892a8; line-height: 1.6; font-size: 15px; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            padding: 10px 20px;
            background: #1a202c;
            border: 1px solid #2563eb20;
            border-radius: 100px;
            font-size: 13px;
            color: #8892a8;
        }
        .status i { color: #f59e0b; font-size: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-shield-halved"></i></div>
        <h1>Ведутся технические работы</h1>
        <p>Сайт временно недоступен. Мы проводим плановое обслуживание, чтобы сделать сервис ещё лучше. Пожалуйста, зайдите позже.</p>
        <div class="status">
            <i class="fas fa-circle"></i>
            Ведутся работы · Функции могут работать некорректно
        </div>
    </div>
</body>
</html>
